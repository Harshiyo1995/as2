version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: as2_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: as2_gateway
    ports:
      - "5433:5432"
    volumes:
      - as2_pg_data:/var/lib/postgresql/data
      # Mount the schema file to automatically initialize the database on first boot
      - ./database/schema.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

volumes:
  as2_pg_data:
